name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release_retry.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release_retry.outputs.tag_name }}
    steps:
      # release-please-action occasionally hits a GraphQL vs REST cache
      # race when labeling a newly-created release PR — the PR exists via
      # REST but GraphQL hasn't seen it yet, so addLabelsToLabelable fails
      # with "Could not resolve to a node with the global id of 'PR_…'".
      # When that happens, the PR is created but unlabeled, and the next
      # run can't find a "pending" release to tag — breaking the whole
      # release flow. Retry once on failure; the second call is idempotent
      # (finds the existing PR) and GraphQL has caught up by then.
      - uses: googleapis/release-please-action@v5
        id: release
        continue-on-error: true
        with:
          release-type: rust
          token: ${{ secrets.PAT_TOKEN }}

      - name: Retry release-please on failure
        if: steps.release.outcome == 'failure'
        uses: googleapis/release-please-action@v5
        id: release_retry
        with:
          release-type: rust
          token: ${{ secrets.PAT_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: Linux_x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: Linux_arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: Darwin_x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: Darwin_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          VERSION=${VERSION#v}
          ARCHIVE="rustydocker_${VERSION}_${{ matrix.name }}.tar.gz"
          tar czf "$ARCHIVE" -C target/${{ matrix.target }}/release rustydocker
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} "${{ env.ARCHIVE }}"
        env:
          GH_TOKEN: ${{ github.token }}
